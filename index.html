<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Typing Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- タイトル画面 -->
  <div id="title-screen">

    <!-- 背景（黒＋粒子） -->
    <div id="bg-layer"></div>

    <!-- タイトルロゴ枠 -->
    <img id="title-frame" src="images/ui_title_frame.png">

    <!-- スクロールテキスト -->
    <div id="scroll-text">
      ようこそ、タイピング修行へ。<br>
      気を高め、己を超えろ。
    </div>

    <!-- コース選択 -->
    <div id="course-buttons">
      <button class="course-btn" data-course="easy">EASY</button>
      <button class="course-btn" data-course="business">BUSINESS</button>
      <button class="course-btn" data-course="it">IT</button>
      <button class="course-btn" data-course="mail">MAIL</button>
    </div>

    <!-- 立ち絵 -->
    <img id="stand-character" src="images/character_stand.png">

  </div>

  <script src="game2.js"></script>
</body>
</html>
