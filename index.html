<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Typing Game</title>
</head>
<body>
  <h1>Typing Game</h1>

  <!-- 単語表示 -->
  <div id="word"></div>
  <div id="reading"></div>

  <!-- 入力欄 -->
  <input id="inputEl" type="text">

  <!-- スコア・タイマー -->
  <div id="score"></div>
  <div id="timer"></div>

  <!-- ボタン -->
  <button id="startBtn">スタート</button>
  <button id="retryBtn" style="display:none;">もう一度</button>

  <script src="game.js"></script>
</body>
</html>
