<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>KIR タイピング王 決定戦</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 背景動画（タイトル画面専用） -->
<video id="bg-video" autoplay loop muted playsinline>
  <source src="videos/title_bg.mp4" type="video/mp4">
</video>

<!-- ゲーム全体のルート -->
<div id="game-root">

  <!-- タイトル画面 -->
  <div id="title-screen">
    <div id="title-logo">KIR タイピング王 決定戦</div>

    <div id="start-buttons">
      <button class="stage-btn" data-stage="greeting">挨拶ステージ</button>
      <button class="stage-btn" data-stage="business">ビジネス会話</button>
      <button class="stage-btn" data-stage="it">IT業界あるある</button>
      <button class="stage-btn" data-stage="mail">メール文言</button>
      <button class="stage-btn" data-stage="keepitreal">裏モード</button>
    </div>
  </div>

  <!-- ゲーム画面 -->
  <div id="game-screen" class="hidden">
    <div id="hud">
      <div id="player-label">PLAYER: GUEST</div>
      <div id="score-label">SCORE: 0</div>
      <div id="multi-label">MULTI: x1</div>
      <div id="time-label">TIME: 60</div>
    </div>

    <div id="word-area">
      <div id="kanji-display"></div>
      <div id="romaji-display"></div>
    </div>

    <div id="message"></div>
  </div>

</div>

<!-- BGMスロット（まだ中身は未定） -->
<audio id="bgm-greeting" src="sounds/greeting.mp3" preload="auto" loop></audio>
<audio id="bgm-business" src="sounds/business.mp3" preload="auto" loop></audio>
<audio id="bgm-it" src="sounds/it.mp3" preload="auto" loop></audio>
<audio id="bgm-mail" src="sounds/mail.mp3" preload="auto" loop></audio>
<audio id="bgm-keepitreal" src="sounds/keepitreal.mp3" preload="auto" loop></audio>

<script src="game.js"></script>
</body>
</html>
