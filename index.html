<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>KIR Typing Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 赤ネオンロゴ -->
  <div class="title-logo">
    第１回 KIR タイピング王決定戦！！
  </div>

  <!-- 4言語巨大フェードイン -->
  <div id="fadein-container">
    <div class="fade-line" id="line1"></div>
    <div class="fade-line" id="line2"></div>
    <div class="fade-line" id="line3"></div>
    <div class="fade-line" id="line4"></div>
  </div>

  <!-- 名前入力 -->
  <div id="name-container">
    <input type="text" id="fullname" placeholder="フルネーム（姓＋名）を入力" />
    <button id="name-confirm">名前を確定する</button>
    <p id="name-error"></p>
  </div>

  <!-- コース選択 -->
  <div id="course-container" class="hidden">
    <button class="course-btn" data-course="easy">初級コース</button>
    <button class="course-btn" data-course="normal">中級コース</button>
    <button class="course-btn" data-course="hard">上級コース</button>
    <button class="course-btn" data-course="expert">超上級コース</button>
  </div>

  <!-- ゲームUI -->
  <div id="game-ui" class="hidden">
    <div id="hud-left">
      <div class="hud-label">TIME</div>
      <div id="time-value">60</div>
    </div>

    <div id="hud-right">
      <div class="hud-block">
        <div class="hud-label">SCORE</div>
        <div id="score-value">0</div>
      </div>
      <div class="hud-block">
        <div class="hud-label">COMBO</div>
        <div id="combo-value">0</div>
      </div>
      <div class="hud-block">
        <div class="hud-label">MULTI</div>
        <div id="multi-value">x1</div>
      </div>
    </div>

    <div id="word-area">
      <div id="current-word"></div>
    </div>

    <div id="input-area">
      <input type="text" id="type-input" autocomplete="off" />
    </div>
  </div>

  <!-- READY画面 / 結果画面 -->
  <div id="overlay" class="hidden"></div>

  <script src="game.js"></script>
</body>
</html>
