<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>KIR Typing Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 背景動画（最背面） -->
  <video id="bg-video" autoplay muted loop>
    <source src="assets/title-bg.mp4" type="video/mp4">
  </video>

  <!-- 赤ネオンロゴ -->
  <div class="title-logo">
    第１回 KIR タイピング王決定戦！！
  </div>

  <!-- 多言語ランダムフェードイン -->
  <div id="fadein-container"></div>

  <!-- 横スクロールテキスト -->
  <div class="scroll-text">
    <div class="scroll-inner">
      最速は誰だ！！スピードキングを目指せ！
      Who is the fastest? Aim for the Speed King!
      Qui est le plus rapide ? Deviens le Speed King !
      Chi è il più veloce? Punta al Speed King!
    </div>
  </div>

  <!-- 名前入力 -->
  <div id="name-container">
    <input type="text" id="fullname" placeholder="フルネーム（姓＋名）を入力" />
    <button id="name-confirm">名前を確定する</button>
    <p id="name-error"></p>
  </div>

  <!-- コース選択 -->
  <div id="course-container" class="hidden">
    <button class="course-btn" data-course="easy">初級コース</button>
    <button class="course-btn" data-course="normal">中級コース</button>
    <button class="course-btn" data-course="hard">上級コース</button>
    <button class="course-btn" data-course="expert">超上級コース</button>
  </div>

  <script src="game.js"></script>
</body>
</html>
