<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>K.i.r タイピング王</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background: #000;
      color: #fff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    #game-root {
      position: relative;
      width: 960px;
      height: 540px;
      overflow: hidden;
      background-color: #000;
      background-size: cover;
      background-position: center;
      border: 2px solid #444;
      box-shadow: 0 0 40px rgba(0,0,0,0.8);
    }

    /* オーバーレイ共通 */
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(0,0,0,0.7);
      z-index: 10;
    }

    /* タイトル画面 */
    #title-screen {
      background-image: url("assets/title/title_background.png");
      background-size: cover;
      background-position: center;
    }
    #title-inner {
      background: rgba(0,0,0,0.6);
      padding: 24px 32px;
      border-radius: 12px;
      border: 1px solid #0ff;
      box-shadow: 0 0 20px rgba(0,255,255,0.4);
      text-align: center;
    }
    #title-logo {
      width: 420px;
      height: 120px;
      background-image: url("assets/title/title_logo.png");
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      margin: 0 auto 16px;
    }
    #player-name-input {
      width: 260px;
      padding: 8px 10px;
      font-size: 16px;
      border-radius: 6px;
      border: 1px solid #0ff;
      background: rgba(0,0,0,0.7);
      color: #0ff;
      margin-bottom: 12px;
      text-align: center;
    }
    #title-hint {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 16px;
    }
    .stage-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .btn {
      min-width: 140px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 2px solid #0ff;
      background: rgba(0,0,0,0.8);
      color: #0ff;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.15s ease-out;
    }
    .btn:hover {
      background: #0ff;
      color: #000;
      box-shadow: 0 0 12px rgba(0,255,255,0.7);
    }
    .btn-secondary {
      border-color: #888;
      color: #ddd;
    }
    .btn-secondary:hover {
      background: #888;
      color: #000;
      box-shadow: 0 0 12px rgba(255,255,255,0.4);
    }

    /* ゲームUI */
    #hud {
      position: absolute;
      inset: 0;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      z-index: 1;
    }
    #top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      text-shadow: 0 0 6px #000;
    }
    #top-left, #top-right {
      display: flex;
      gap: 16px;
      align-items: center;
    }
    .label {
      color: #aaa;
      margin-right: 4px;
    }
    #timer-bar-container {
      position: relative;
      width: 260px;
      height: 12px;
      border-radius: 999px;
      border: 1px solid #0ff;
      overflow: hidden;
      background: rgba(0,0,0,0.6);
    }
    #timer-bar {
      position: absolute;
      inset: 0;
      width: 100%;
      background: linear-gradient(90deg, #0f0, #ff0, #f00);
      transform-origin: left center;
    }

    #center-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-shadow: 0 0 8px #000;
    }
    #kanji-display {
      font-size: 48px;
      margin-bottom: 8px;
    }
    #reading-display {
      font-size: 20px;
      color: #0ff;
      margin-bottom: 16px;
    }
    #romaji-input {
      width: 320px;
      padding: 10px 12px;
      font-size: 18px;
      border-radius: 8px;
      border: 1px solid #0ff;
      background: rgba(0,0,0,0.7);
      color: #0ff;
      text-align: center;
    }

    #bottom-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      text-shadow: 0 0 6px #000;
    }
    #stage-label {
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid #0ff;
      background: rgba(0,0,0,0.6);
      color: #0ff;
    }
    #message {
      flex: 1;
      text-align: center;
      color: #ffd700;
    }
    #retry-button {
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid #0ff;
      background: rgba(0,0,0,0.8);
      color: #0ff;
      cursor: pointer;
      display: none;
    }
    #retry-button:hover {
      background: #0ff;
      color: #000;
    }

    /* ゲームオーバーオーバーレイ */
    #gameover-screen {
      display: none;
      text-align: center;
    }
    #gameover-inner {
      background: rgba(0,0,0,0.7);
      padding: 24px 32px;
      border-radius: 12px;
      border: 1px solid #f0f;
      box-shadow: 0 0 20px rgba(255,0,255,0.5);
    }
    #gameover-title {
      font-size: 24px;
      margin-bottom: 12px;
    }
    #gameover-score {
      font-size: 18px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div id="game-root">
    <!-- タイトル画面 -->
    <div id="title-screen" class="overlay">
      <div id="title-inner">
        <div id="title-logo"></div>
        <div style="margin-bottom: 8px; font-size: 14px;">K.i.r タイピング王</div>
        <input id="player-name-input" type="text" placeholder="名前を入力（任意）">
        <div id="title-hint">
          通常モード：<br>
          1. 挨拶　2. ビジネス会話　3. IT用語<br>
          （※タイトル画面で <code>keepitreal</code> を10秒以内に入力すると…？）
        </div>
        <div class="stage-buttons">
          <button class="btn" data-stage="greeting">挨拶ステージ</button>
          <button class="btn" data-stage="business">ビジネス会話</button>
          <button class="btn" data-stage="it">IT用語</button>
          <button class="btn btn-secondary" id="title-start-random">ランダム</button>
        </div>
      </div>
    </div>

    <!-- ゲームオーバー画面 -->
    <div id="gameover-screen" class="overlay">
      <div id="gameover-inner">
        <div id="gameover-title">結果発表</div>
        <div id="gameover-score"></div>
        <button class="btn" id="gameover-retry">タイトルに戻る</button>
      </div>
    </div>

    <!-- HUD / ゲーム画面 -->
    <div id="hud">
      <div id="top-bar">
        <div id="top-left">
          <div><span class="label">PLAYER</span><span id="player-name-label">GUEST</span></div>
          <div><span class="label">SCORE</span><span id="score-label">0</span></div>
        </div>
        <div id="top-right">
          <div><span class="label">TIME</span><span id="time-label">60.0</span></div>
          <div id="timer-bar-container"><div id="timer-bar"></div></div>
        </div>
      </div>

      <div id="center-area">
        <div id="kanji-display">準備OK？</div>
        <div id="reading-display">ステージを選んでください</div>
        <input id="romaji-input" type="text" autocomplete="off" disabled>
      </div>

      <div id="bottom-bar">
        <div id="stage-label">STAGE: -</div>
        <div id="message"></div>
        <button id="retry-button">もう一度</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
