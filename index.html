<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Typing Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- タイトル画面 -->
  <div id="title-screen">

    <!-- 背景（粒子） -->
    <div id="bg-layer"></div>

    <!-- タイトル画像 -->
    <img id="title-main" src="images/title_main.png">

    <!-- サブテキスト -->
    <div id="title-subtext">
      ようこそ、タイピング修行へ。<br>
      技を磨き、己を鍛えろ。
    </div>

    <!-- 名前入力 -->
    <div id="name-area">
      <div id="name-error"></div>
      <input id="name-input" type="text" placeholder="フルネーム（姓　名）を入力">
      <button id="name-submit">決定</button>
    </div>

    <!-- 名前表示（決定後） -->
    <button id="name-display" style="display:none;"></button>

    <!-- コース選択（名前決定後） -->
    <div id="course-buttons" style="display:none;">
      <button class="course-btn" data-course="easy">EASY</button>
      <button class="course-btn" data-course="business">BUSINESS</button>
      <button class="course-btn" data-course="it">IT</button>
      <button class="course-btn" data-course="mail">MAIL</button>
    </div>

    <!-- 🔊 音量調整（説明付き） -->
    <div id="volume-area">
      <div id="volume-label">
        🔊 BGMは最初は無音です<br>
        音量を上げると流れ始めます
      </div>
      <input id="volume-slider" type="range" min="0" max="100" value="0">
    </div>

  </div>

  <!-- ゲーム画面 -->
  <div id="game-screen">

    <!-- ひらがな -->
    <div id="word-jp"></div>

    <!-- ローマ字 -->
    <div id="word-romaji"></div>

    <!-- 106/109 キーボード -->
    <div id="keyboard">

      <!-- 1段目 -->
      <div class="key-row">
        <span class="key">1</span>
        <span class="key">2</span>
        <span class="key">3</span>
        <span class="key">4</span>
        <span class="key">5</span>
        <span class="key">6</span>
        <span class="key">7</span>
        <span class="key">8</span>
        <span class="key">9</span>
        <span class="key">0</span>
        <span class="key">-</span>
        <span class="key">^</span>
        <span class="key">￥</span>
      </div>

      <!-- 2段目 -->
      <div class="key-row">
        <span class="key">Q</span>
        <span class="key">W</span>
        <span class="key">E</span>
        <span class="key">R</span>
        <span class="key">T</span>
        <span class="key">Y</span>
        <span class="key">U</span>
        <span class="key">I</span>
        <span class="key">O</span>
        <span class="key">P</span>
        <span class="key">@</span>
        <span class="key">[</span>
      </div>

      <!-- 3段目 -->
      <div class="key-row">
        <span class="key">A</span>
        <span class="key">S</span>
        <span class="key">D</span>
        <span class="key">F</span>
        <span class="key">G</span>
        <span class="key">H</span>
        <span class="key">J</span>
        <span class="key">K</span>
        <span class="key">L</span>
        <span class="key">;</span>
        <span class="key">:</span>
        <span class="key">]</span>
      </div>

      <!-- 4段目 -->
      <div class="key-row">
        <span class="key">Z</span>
        <span class="key">X</span>
        <span class="key">C</span>
        <span class="key">V</span>
        <span class="key">B</span>
        <span class="key">N</span>
        <span class="key">M</span>
        <span class="key">,</span>
        <span class="key">.</span>
        <span class="key">/</span>
        <span class="key">_</span>
      </div>

    </div>

  </div>

  <script src="game2.js"></script>
</body>
</html>
